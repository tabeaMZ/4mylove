<!DOCTYPE html>
<html>
<head>
    <title>Für Lea 💌</title>
    <style>
        .banner-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .banner-image {
            width: 100%;
            height: 200px;
            object-fit: cover; 
            border-radius: 15px; 
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); 
            transition: transform 0.3s ease;
        }
        .banner-image:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body style="text-align:center;font-family:Arial;padding-top:50px;background-color: #ffe6e6;">
    <h1>Ich liebe dich ❤️</h1>
    <p>Diese Seite gehört nur dir.</p>

    <div class="banner-container">
        <img class="banner-image" src="b41ae8cc-bbd9-4017-aa81-ed50daff85a4.jpeg" alt="Erinnerung 1">
        <img class="banner-image" src="784d44a0-80b1-48e8-9c4d-1049778122a8.jpeg" alt="Erinnerung 2">
        <img class="banner-image" src="6cd0bace-4202-4aed-b1ef-13fd5fba872b.jpeg" alt="Erinnerung 3">
        <img class="banner-image" src="b69f217e-5e4c-4d3d-aada-aeeb61143308.jpeg" alt="Erinnerung 4">
    </div>
</body>
</html>
